name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Regenerate example plots and animations
        run: Rscript run_all_examples.R

      - name: Regenerate analysis artifacts
        run: Rscript analysis/generate_results.R

      - name: Run validation scripts
        run: Rscript tests/run_all_tests.R

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages site
        run: |
          mkdir -p _site/analysis _site/images _site/docs
          cp -R analysis/generated _site/analysis/
          cp -R images/. _site/images/
          cp README.md LICENSE _site/
          cp -R docs/. _site/docs/
          touch _site/.nojekyll
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=analysis/generated/index.html">
            <title>Celestial Dynamics Results</title>
            <style>
              :root {
                color-scheme: light dark;
                --bg: #f7f7f4;
                --surface: #ffffff;
                --text: #1d2328;
                --muted: #5b6670;
                --line: #d7d9d6;
                --accent-strong: #0f5364;
                --shadow: 0 18px 45px rgba(34, 41, 47, 0.08);
              }
              @media (prefers-color-scheme: dark) {
                :root {
                  --bg: #101416;
                  --surface: #171d20;
                  --text: #edf1f2;
                  --muted: #a9b4b8;
                  --line: #2e393d;
                  --accent-strong: #9eddea;
                  --shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
                }
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 1rem;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                color: var(--text);
                background: var(--bg);
                line-height: 1.6;
              }
              main {
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 1.25rem;
                background: var(--surface);
                box-shadow: var(--shadow);
              }
              a {
                color: var(--accent-strong);
                font-weight: 800;
                text-underline-offset: 0.2em;
              }
              p { margin: 0; color: var(--muted); }
            </style>
          </head>
          <body>
            <main>
              <p>Opening <a href="analysis/generated/index.html">Celestial Dynamics Results</a>.</p>
            </main>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
