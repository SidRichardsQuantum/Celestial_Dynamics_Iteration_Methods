name: Regenerate plots

on:
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Regenerate example plots
        run: Rscript run_all_examples.R

      - name: Regenerate analysis artifacts
        run: Rscript analysis/generate_results.R

      - name: Validate regenerated plots
        run: Rscript tests/run_all_tests.R

      - name: Upload regenerated images
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-images
          path: images/

      - name: Upload regenerated analysis
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-analysis
          path: |
            analysis/generated/
            docs/RESULTS.md
